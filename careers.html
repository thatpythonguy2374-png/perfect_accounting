<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Careers | Perfect Accounting Solutions</title>

<link rel="stylesheet" href="style1.css">

</head>

<body>

<section class="career-section">

<div class="career-container">

<h2 class="career-title">Apply For Career</h2>

<p class="career-subtitle">
We nurture and cultivate a sense of pride in the work and create team leaders.
Your growth chart will be governed by well-defined transparent policies of the firm.
</p>

<!--  FORM START -->
<form id="careerForm">

<div class="form-grid">

<!-- FIRST NAME -->
<div class="form-group">
<label>First Name *</label>
<input type="text" name="first_name" required>
</div>

<!-- LAST NAME -->
<div class="form-group">
<label>Last Name *</label>
<input type="text" name="last_name" required>
</div>

<!-- EMAIL -->
<div class="form-group">
<label>Email *</label>
<input type="email" name="email" required>
</div>

<!-- MOBILE -->
<div class="form-group">
<label>Mobile No *</label>
<input type="tel" name="mobile" required>
</div>

<!-- GENDER -->
<div class="form-group">
<label>Gender *</label>
<select name="gender" required>
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<!-- POSITION -->
<div class="form-group">
<label>Position Applying For *</label>
<input type="text" name="position" required>
</div>

<!-- DOB -->
<div class="form-group">
<label>Date of Birth *</label>
<input type="date" name="dob" required>
</div>

<!-- QUALIFICATION -->
<div class="form-group">
<label>Highest Qualification *</label>
<input type="text" name="qualification">
</div>

<!-- PORTFOLIO -->
<div class="form-group">
<label>Portfolio Website</label>
<input type="url" name="portfolio" placeholder="http://">
</div>

<!-- RESUME LINK -->
<div class="form-group">
<label>Resume Link (Google Drive / Link)</label>
<input type="url" name="resume_link" placeholder="Paste resume link">
</div>

<!-- LAST COMPANY -->
<div class="form-group">
<label>Last Company Worked For</label>
<input type="text" name="company">
</div>

<!-- EXPERIENCE -->
<div class="form-group">
<label>Years of Experience</label>

<div class="experience-select">

<select name="experience_year">
<option value="">Year</option>
<option>0</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5+</option>
</select>

<select name="experience_month">
<option value="">Month</option>
<option>0</option>
<option>3</option>
<option>6</option>
<option>9</option>
<option>12</option>
</select>

</div>

</div>

</div>

<!-- MESSAGE -->
<div class="form-group full-width">
<label>Reference / Comments / Questions</label>
<textarea name="message" rows="4"></textarea>
</div>

<!-- SUBMIT -->
<div class="submit-area">
<button type="submit" class="btn-primary">
Send Application
</button>
</div>

</form>
<div id="careerSuccess" class="success-box" style="display:none;">
    Application submitted successfully.  
    We will contact you soon.
</div>
</div>
</section>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="script1.js"></script>

</body>
</html>
